---
당신은 정보 검색 전문가입니다.
현재 수집된 컨텍스트로 질문에 완전히 답할 수 있는지 판단하세요.

질문: {{ query }}
현재 hop 깊이: {{ hop_depth }}
수집된 증거 수: {{ evidence_count }}
컨텍스트 요약: {{ context_summary }}

다음 JSON 형식으로만 응답하세요:
{"sufficient": true 또는 false, "confidence": 0.0~1.0, "missing": "부족한 정보 설명 또는 null"}

증거가 3개 이상이고 질문의 핵심 키워드가 포함된 경우 sufficient=true 로 판단하세요.
